<style>
:root {
  --krds-primary-5: #ecf2fe;
  --krds-primary-10: #d8e5fd;
  --krds-primary-40: #4c87f6;
  --krds-primary-50: #256ef4;
  --krds-primary-60: #0b50d0;
  --krds-primary-80: #052561;
  --krds-gray-0: #ffffff;
  --krds-gray-5: #f4f5f6;
  --krds-gray-10: #e6e8ea;
  --krds-gray-20: #cdd1d5;
  --krds-gray-30: #b1b8be;
  --krds-gray-40: #8a949e;
  --krds-gray-50: #6d7882;
  --krds-gray-60: #58616a;
  --krds-gray-70: #464c53;
  --krds-gray-80: #33363d;
  --krds-gray-90: #1e2124;
  --krds-gray-100: #000000;
  --krds-danger-5: #fdefec;
  --krds-danger-50: #de3412;
  --krds-danger-60: #bd2c0f;
  --krds-success-5: #eaf6ec;
  --krds-success-50: #228738;
  --krds-info-5: #e7f4fe;
  --krds-info-50: #0b78cb;
  --krds-radius-sm: 4px;
  --krds-radius-md: 6px;
  --krds-radius-lg: 8px;
  /* Static Pretendard 1순위 (HTML-to-Figma 플러그인은 static font weight를 정확히 매핑함) */
  --krds-font: Pretendard, 'Pretendard GOV', 'Pretendard Variable', 'Pretendard GOV Variable', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;

  /* ETRIBE 양식 전용 토큰 */
  --etribe-orange: #f37320;       /* ETRIBE 브랜드 오렌지 */
  --etribe-header-bg: #ffffff;    /* 메타 테이블 값 셀 배경 */
  --etribe-header-label-bg: #f4f5f6; /* 메타 테이블 라벨 셀 배경 */
  --etribe-section-bg: #58616a;   /* Description 섹션 헤더 배경 */
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; font-family: var(--krds-font); }
html, body { font-family: var(--krds-font); background: var(--krds-gray-20); }
input, button, select, textarea { font-family: var(--krds-font); }
body {
  /* 캔버스 외곽: 2560px 고정 폭, 가로 스크롤 허용 */
  min-width:2560px;
}

/* ===== ETRIBE: Page Wrapper (2560px 고정 + 외곽 프레임) ===== */
.sb-page {
  width:2560px;
  margin:0 auto;
  background:var(--krds-gray-5);
  min-height:100vh;
  border:1px solid var(--krds-gray-30);
  box-shadow:0 0 0 1px var(--krds-gray-10) inset;
}

/* ===== ETRIBE: Top Meta Header (sb-page 내부 full width) ===== */
.etribe-meta {
  width:100%;
  border-collapse:collapse;
  background:var(--krds-gray-0);
  border:1px solid var(--krds-gray-80);
  font-family:var(--krds-font);
  font-size:16px;
  table-layout:fixed;
}
.etribe-meta th,
.etribe-meta td {
  border:1px solid var(--krds-gray-20);
  padding:16px 20px;
  vertical-align:middle;
  height:56px;
  font-family:var(--krds-font);
  font-size:16px;
  line-height:1.4;
}
.etribe-meta th {
  background:var(--etribe-header-label-bg);
  color:var(--krds-gray-90);
  font-weight:700;
  text-align:left;
  letter-spacing:-.01em;
}
.etribe-meta td {
  background:var(--etribe-header-bg);
  color:var(--krds-gray-80);
  font-weight:400;
}

/* ===== Page Grid (메타 헤더 아래 2단) ===== */
.page { display:grid; grid-template-columns:1fr 640px; align-items: stretch; }

/* ===== Left: Wireframe Panel (기존 유지) ===== */
.wf-panel { display:flex; flex-direction:column; align-items:center; padding:32px 24px 80px; }

.wf-canvas-wrap { display:flex; position:relative; align-items:flex-start; }
.num-strip { width:28px; flex-shrink:0; }
[data-num] { position:relative; }
.num-badge {
  position:absolute; top:0; left:-44px;
  min-width:22px; height:22px; padding:0 6px;
  border-radius:11px;
  background:var(--krds-danger-5);
  color:var(--krds-danger-50);
  border:1px solid var(--krds-danger-50);
  font-size:10px; font-weight:700;
  display:flex; align-items:center; justify-content:center;
  z-index:10; pointer-events:none; line-height:1;
}
.num-badge.edge { left:-28px; }

.wf-canvas { width:390px; min-height:844px; background:var(--krds-gray-0); border-radius:var(--krds-radius-lg); overflow:visible; box-shadow:0 2px 16px rgba(0,0,0,.08); position:relative; display:flex; flex-direction:column; }
/* §6.6 CTA/채팅 Input Box 최하단 고정 — 고정할 영역에 class="wf-bottom-fixed" 부여 (opt-in) */
.wf-canvas-content { flex:1; overflow:visible; }
.wf-canvas > .wf-bottom-fixed { margin-top:auto; flex-shrink:0; }

/* ===== Wireframe Inner Components (기존 유지) ===== */
.krds-app-bar { height:52px; background:var(--krds-gray-0); border-bottom:1px solid var(--krds-gray-10); display:flex; align-items:center; padding:0 16px; }
.krds-app-bar-back { background:none; border:none; padding:0; font-size:20px; color:var(--krds-gray-90); cursor:pointer; width:44px; height:44px; display:flex; align-items:center; justify-content:center; }
.krds-app-bar-title { flex:1; text-align:center; font-size:16px; font-weight:600; color:var(--krds-gray-90); }
.krds-app-bar-action { background:none; border:none; padding:0; font-size:13px; color:var(--krds-primary-50); font-weight:600; width:44px; height:44px; display:flex; align-items:center; justify-content:center; }

.krds-content { padding:20px 16px; }
.krds-page-title { font-size:22px; font-weight:700; color:var(--krds-gray-90); margin-bottom:4px; }
.krds-page-desc { font-size:14px; font-weight:400; color:var(--krds-gray-50); margin-bottom:16px; }

.search-bar { display:flex; gap:8px; margin-bottom:16px; }
.search-bar .krds-input { flex:1; height:40px; border:1px solid var(--krds-gray-20); border-radius:var(--krds-radius-md); padding:0 12px; font-size:14px; font-family:var(--krds-font); color:var(--krds-gray-90); outline:none; }
.search-bar .krds-input::placeholder { color:var(--krds-gray-30); }
.search-bar .krds-btn { height:40px; padding:0 16px; background:var(--krds-primary-50); color:var(--krds-gray-0); border:none; border-radius:var(--krds-radius-md); font-size:14px; font-weight:600; cursor:pointer; font-family:var(--krds-font); }

.tab-bar { display:flex; gap:0; border-bottom:2px solid var(--krds-gray-10); margin-bottom:12px; }
.tab-item { padding:10px 14px; font-size:13px; font-weight:600; color:var(--krds-gray-40); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; }
.tab-item.active { color:var(--krds-primary-50); border-bottom-color:var(--krds-primary-50); }

.notice-list { display:flex; flex-direction:column; }
.notice-item { padding:14px 0; border-bottom:1px solid var(--krds-gray-10); }
.notice-item.pinned { background:var(--krds-primary-5); margin:0 -16px; padding:14px 16px; border-radius:var(--krds-radius-sm); border-bottom:none; margin-bottom:2px; }
.notice-badge { display:inline-block; font-size:10px; font-weight:700; padding:2px 6px; border-radius:var(--krds-radius-sm); margin-right:6px; }
.notice-badge.pin { background:var(--krds-danger-50); color:var(--krds-gray-0); }
.notice-badge.category { background:var(--krds-gray-10); color:var(--krds-gray-60); }
.notice-badge.new { background:var(--krds-primary-50); color:var(--krds-gray-0); }
.notice-title { font-size:15px; font-weight:600; color:var(--krds-gray-90); margin-bottom:4px; display:flex; align-items:center; flex-wrap:wrap; gap:4px; }
.notice-title .title-text { flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.notice-meta { font-size:12px; color:var(--krds-gray-40); display:flex; gap:8px; align-items:center; }
.notice-meta .attach-icon { color:var(--krds-gray-30); }

.pagination { display:flex; justify-content:center; align-items:center; gap:4px; margin-top:20px; }
.pagination .page-btn { width:32px; height:32px; border-radius:var(--krds-radius-sm); border:1px solid var(--krds-gray-10); background:var(--krds-gray-0); font-size:13px; color:var(--krds-gray-60); display:flex; align-items:center; justify-content:center; cursor:pointer; font-family:var(--krds-font); }
.pagination .page-btn.active { background:var(--krds-primary-50); color:var(--krds-gray-0); border-color:var(--krds-primary-50); font-weight:700; }
.pagination .page-btn.nav { font-size:11px; color:var(--krds-gray-40); }

.fab { position:absolute; bottom:24px; right:16px; width:52px; height:52px; border-radius:50%; background:var(--krds-primary-50); color:var(--krds-gray-0); border:none; font-size:24px; font-weight:400; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 12px rgba(37,110,244,.3); cursor:pointer; }

/* ===== Sub-canvas (모달/다이얼로그 우측 배치) ===== */
.wf-sub-connector { display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:0 10px; }
.wf-sub-connector-line { width:40px; border-top:1px dashed var(--krds-gray-30); }
.wf-sub-connector-label { font-size:9px; color:var(--krds-gray-40); white-space:nowrap; margin-top:4px; }
.wf-sub-canvas { width:300px; background:var(--krds-gray-0); border-radius:var(--krds-radius-lg); box-shadow:0 2px 16px rgba(0,0,0,.08); position:relative; overflow:visible; }
.wf-sub-title { font-size:10px; font-weight:700; color:var(--krds-gray-40); letter-spacing:.05em; margin-bottom:6px; }
.dialog-box { padding:28px 20px 20px; text-align:center; }
.dialog-title { font-size:16px; font-weight:600; color:var(--krds-gray-90); margin-bottom:8px; }
.dialog-desc { font-size:14px; color:var(--krds-gray-50); margin-bottom:24px; line-height:1.5; }
.dialog-actions { display:flex; gap:8px; }
.dialog-actions button { flex:1; height:44px; border-radius:var(--krds-radius-md); font-size:14px; font-weight:600; cursor:pointer; font-family:var(--krds-font); }
.dialog-actions .cancel { background:var(--krds-gray-0); color:var(--krds-gray-60); border:1px solid var(--krds-gray-20); }
.dialog-actions .confirm-action { background:var(--krds-primary-50); color:var(--krds-gray-0); border:none; }
.dialog-actions .confirm-delete { background:var(--krds-danger-50); color:var(--krds-gray-0); border:none; }

/* ===== Right: Description Panel (ETRIBE 양식) ===== */
.desc-panel {
  background:var(--krds-gray-0);
  border-left:1px solid var(--krds-gray-10);
  padding:32px 28px;
  overflow:visible;
  display:flex;
  flex-direction:column;
  gap:20px;
  font-family:var(--krds-font);
}

.desc-section { border:1px solid var(--krds-gray-20); font-family:var(--krds-font); }
.desc-section-header {
  background:var(--etribe-section-bg);
  color:var(--krds-gray-0);
  font-family:var(--krds-font);
  font-size:18px;
  font-weight:700;
  padding:12px 20px;
  letter-spacing:.02em;
}
.desc-section-body {
  padding:20px 24px;
  background:var(--krds-gray-0);
  font-family:var(--krds-font);
  font-size:16px;
  color:var(--krds-gray-90);
  line-height:1.7;
}
.desc-section-body p {
  font-family:var(--krds-font);
  font-size:16px;
  color:var(--krds-gray-80);
  line-height:1.7;
}

/* Description 계층 (HTML-to-Figma 호환: 한 항목 = 하나의 <p>) */
.desc-list { list-style:none; font-family:var(--krds-font); margin:0; padding:0; }
.desc-list > li { margin-bottom:20px; }
.desc-list > li:last-child { margin-bottom:0; }

.desc-block {
  font-family:var(--krds-font);
  font-size:16px;
  font-weight:400;
  line-height:1.75;
  color:var(--krds-gray-80);
  margin:0;
  word-break:keep-all;
}
.desc-block .lvl1 {
  font-size:18px;
  font-weight:700;
  color:var(--krds-gray-90);
}
.desc-block .lvl2 {
  font-size:16px;
  font-weight:400;
  color:var(--krds-gray-80);
}
.desc-block .lvl3 {
  font-size:16px;
  font-weight:600;
  color:var(--krds-gray-80);
}
.desc-block .lvl4 {
  font-size:16px;
  font-weight:400;
  color:var(--krds-gray-60);
}
.desc-block .note {
  font-size:16px;
  font-weight:500;
  color:var(--krds-gray-60);
}
.desc-block .reason {
  font-size:14px;
  font-weight:400;
  color:var(--krds-gray-50);
}
.desc-block code {
  font-family:var(--krds-font);
  font-size:15px;
  font-weight:500;
  color:var(--krds-primary-60);
  background:var(--krds-gray-5);
  padding:2px 6px;
  border-radius:3px;
}
